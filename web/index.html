<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Phone Call</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
    }
  </script>
  <script src="/plugin-bridge.js"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="h-screen w-screen overflow-hidden bg-gray-100 text-gray-900 transition-colors duration-300"
      data-theme="light">

  <div id="app" class="flex flex-col h-full max-w-lg mx-auto">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-200
                    bg-white/80 backdrop-blur-sm shrink-0
                    dark:bg-gray-900/80 dark:border-gray-700">
      <div class="flex items-center gap-2">
        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-400 status-dot-idle"></div>
        <h1 class="text-base font-semibold">AI 通话</h1>
      </div>
      <button id="btn-clear"
              class="text-xs px-3 py-1.5 rounded-full bg-gray-100 hover:bg-gray-200
                     dark:bg-gray-800 dark:hover:bg-gray-700 transition-colors
                     disabled:opacity-40 disabled:cursor-not-allowed"
              disabled>
        清除对话
      </button>
    </header>

    <!-- Avatar + Status -->
    <div class="flex flex-col items-center pt-8 pb-4 shrink-0">
      <div id="avatar" class="avatar-ring avatar-idle">
        <div class="avatar-inner">
          <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456Z" />
          </svg>
        </div>
      </div>
      <p id="status-text" class="mt-3 text-sm text-gray-500 dark:text-gray-400">等待连接...</p>
    </div>

    <!-- Transcript -->
    <div id="transcript"
         class="flex-1 overflow-y-auto px-4 space-y-3 pb-4 scroll-smooth">
      <!-- Messages will be appended here -->
    </div>

    <!-- Call / hang-up button -->
    <div class="shrink-0 flex flex-col items-center pb-6 pt-2">
      <button id="btn-call"
              class="btn-call select-none"
              aria-label="拨号"
              disabled>
      </button>
      <p id="call-hint" class="mt-2 text-xs text-gray-400 dark:text-gray-500">点击拨号</p>
    </div>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
